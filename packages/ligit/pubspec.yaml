name: ligit
description: >-
  Idiomatic Dart bindings to libgit2, the portable C implementation of Git.
  Open, inspect, and manipulate repositories without shelling out.
version: 0.0.1
repository: https://github.com/elias8/libgit2/tree/main/packages/ligit
issue_tracker: https://github.com/elias8/libgit2/issues
resolution: workspace

# Mirrors libgit2's supported platforms (excluding web — libgit2 has no
# meaningful WASM target).
platforms:
  android:
  ios:
  linux:
  macos:
  windows:

topics:
  - git
  - libgit2
  - vcs
  - ffi

environment:
  sdk: ^3.11.0

dependencies:
  code_assets: ^1.0.0
  crypto: ^3.0.7
  ffi: ^2.2.0
  hooks: ^1.0.2
  meta: ^1.16.0

dev_dependencies:
  ffigen: ^20.1.1
  logging: ^1.3.0
  path: ^1.9.1
  test: ^1.25.6
